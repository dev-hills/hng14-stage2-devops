name: HNG Stage 2 CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  pipeline:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --------------------
      # LINT
      # --------------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Run ESLint
        run: |
          cd frontend
          npx eslint .

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install API dependencies
        run: |
          cd api
          pip install -r requirements.txt
          pip install flake8 pytest pytest-cov

      - name: Run flake8
        run: |
          flake8 api
          flake8 worker

      - name: Run Hadolint API
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile
          ignore: DL3018

      - name: Run Hadolint Frontend
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile
          ignore: DL3018

      - name: Run Hadolint Worker
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: worker/Dockerfile

      # --------------------
      # TEST
      # --------------------
      - name: Run pytest
        run: |
          cd api
          PYTHONPATH=. pytest --cov=. --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage.xml

      # --------------------
      # BUILD
      # --------------------
      - name: Build Docker images
        run: |
          docker build -t localhost:5000/api:${{ github.sha }} -t localhost:5000/api:latest ./api
          docker build -t localhost:5000/frontend:${{ github.sha }} -t localhost:5000/frontend:latest ./frontend
          docker build -t localhost:5000/worker:${{ github.sha }} -t localhost:5000/worker:latest ./worker

      - name: Push images to local registry
        run: |
          docker push localhost:5000/api:${{ github.sha }}
          docker push localhost:5000/api:latest
          docker push localhost:5000/frontend:${{ github.sha }}
          docker push localhost:5000/frontend:latest
          docker push localhost:5000/worker:${{ github.sha }}
          docker push localhost:5000/worker:latest

      # --------------------
      # SECURITY SCAN
      # --------------------
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget curl
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin

      - name: Scan API image
        run: |
          trivy image \
            --severity CRITICAL \
            --exit-code 1 \
            --format sarif \
            --output trivy-results.sarif \
            localhost:5000/api:latest

      - name: Upload SARIF report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-results.sarif

      # --------------------
      # INTEGRATION TEST
      # --------------------
      - name: Start stack
        run: docker compose up -d

      - name: Wait for services
        run: sleep 15

      - name: Integration test
        run: |
          curl -f http://localhost:3000
          curl -f http://localhost:8000/health

      - name: Tear down stack
        if: always()
        run: docker compose down -v

      # --------------------
      # DEPLOY
      # --------------------
      - name: Rolling deploy simulation
        if: github.ref == 'refs/heads/main'
        run: |
          docker compose up -d
          sleep 10
          STATUS=$(docker inspect --format='{{.State.Health.Status}}' $(docker compose ps -q api))
          if [ "$STATUS" != "healthy" ]; then
            echo "Health check failed. Aborting deploy."
            exit 1
          fi
          echo "Deployment successful"