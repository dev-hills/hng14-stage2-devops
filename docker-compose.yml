services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      API_URL: ${API_URL}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - app-network
    mem_limit: 256m
    cpus: 0.5

  api:
    build: ./api
    ports:
      - "8000:8000"
    environment:
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app-network
    mem_limit: 256m
    cpus: 0.5

  worker:
    build: ./worker
    environment:
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app-network
    mem_limit: 256m
    cpus: 0.5

  redis:
    image: redis:7-alpine
    networks:
      - app-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5
    mem_limit: 128m
    cpus: 0.25

networks:
  app-network:
    driver: bridge
